workflows:
  android-build:
    name: Android Build
    max_build_duration: 60
    environment:
      node: 22
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web app
        script: |
          npm run build
      - name: Sync Capacitor
        script: |
          npx cap sync android
      - name: Build Android Release APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
      - name: Build Android Debug APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/**/*.apk
